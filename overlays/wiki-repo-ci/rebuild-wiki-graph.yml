# __ADAPTER_GENERATED_MARKER__
#
# Rebuilds the wiki's root .graph.json (section edges + backlinks) and directory
# index summaries after a PR merges into the default branch. Consumer PRs (incl.
# the shared-wiki MCP PR flow) carry their own companion *.index.md, but the
# cross-page aggregate .graph.json cannot ride in those patches, so it would
# otherwise go stale until a maintainer re-ran update-wiki/migrate-wiki by hand.
#
# This uses the SAME vendored helper the repo-local skills use
# (.claude/wiki-tools/scripts/wiki_migrate_helper.py), so "what counts as an edge"
# never forks between this CI and a human maintainer.
#
# Managed by superpower-adapter's export-wiki-skills. Re-export overwrites it;
# export with --no-graph-ci removes it. Delete it if you do not want CI rebuilds.
name: Rebuild wiki section graph

on:
  push:
    # Only markdown changes can affect the graph. The regenerated .graph.json is
    # not markdown, so the bot's own push never re-triggers this path filter.
    paths:
      - '**/*.md'

permissions:
  contents: write

concurrency:
  group: rebuild-wiki-graph-${{ github.ref }}
  cancel-in-progress: false

jobs:
  rebuild-graph:
    # Only act on the default branch (= the wiki's base). [skip ci] on the bot
    # commit below is the second loop guard (GitHub skips the run entirely).
    if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Regenerate directory indexes + .graph.json
        run: |
          python3 .claude/wiki-tools/scripts/wiki_migrate_helper.py \
            --generate-indexes . --wiki-dir .

      - name: Commit regenerated graph if changed
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "Graph already up to date; nothing to commit."
            exit 0
          fi
          git config user.name  'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'chore(wiki): rebuild section graph [skip ci]'
          git push
